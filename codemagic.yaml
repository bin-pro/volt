workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: 3.32.2
      xcode: 16.0
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Generate iOS config (Generated.xcconfig)
        script: flutter build ios --config-only

      - name: Fix deployment targets & bitcode
        script: |
          find ios -name "*.pbxproj" -exec \
            sed -i '' \
              -e 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9][0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' \
              -e 's/ENABLE_BITCODE = YES/ENABLE_BITCODE = NO/g' \
            {} \;

      - name: Pod install
        script: |
          cd ios && pod install --repo-update

      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/Runner.app
      - /tmp/xcodebuild_logs/*.log
