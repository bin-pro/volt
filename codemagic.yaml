workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: 3.32.2
      xcode: 15.4
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Set deployment target
        script: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' \
            ios/Runner.xcodeproj/project.pbxproj

      - name: Pod install
        script: |
          cd ios && pod install

      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - build/ios/**/*.app
