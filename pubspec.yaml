name: volt
description: 웨이트 볼륨 트래커 — 세트 데이터를 볼륨(weight×reps)으로 집계
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 상태 관리
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 로컬 DB (SQLite)
  drift: ^2.26.0
  drift_flutter: ^0.2.7
  sqlite3_flutter_libs: ^0.5.24

  # 라우팅
  go_router: ^14.2.7

  # 차트
  fl_chart: ^0.69.0

  # 유틸
  intl: ^0.19.0
  path: ^1.9.0
  path_provider: ^2.1.3
  shared_preferences: ^2.3.1
  uuid: ^4.4.0

  # 폰트
  google_fonts: ^6.2.1

  # 타이머 사운드 / 진동
  audioplayers: ^6.1.0
  vibration: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # 코드 생성
  build_runner: ^2.4.11
  drift_dev: ^2.26.0
  riverpod_generator: ^2.4.3
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.13

flutter:
  uses-material-design: true

  assets:
    - assets/data/exercises_seed.json
    - assets/data/muscle_groups_seed.json
    - assets/images/muscle_groups/
    - assets/sounds/

  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500
